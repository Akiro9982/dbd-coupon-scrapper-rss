name: KeepAlive (Mantener vivo el repositorio)

on:
  schedule:
    - cron: '0 0 1 * *' # Corre el día 1 de cada mes
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: gautamkrishnar/keepalive-workflow@v1